<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Convertor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="unit-convertor" id="main-content">
      <section class="unit-covertor__form" aria-labelledby="unite-convertor">
        <h1 class="unit-convertor__title" id="page-title">
          Metric/Imperial Unit Conversion
        </h1>
        <input
          type="number"
          class="unit-converter__input"
          id="input-value"
          name="inputValue"
          min="0"
          step="any"
          placeholder="e.g. 20"
          required
        />
        <button type="button" id="btn-convert" class="unit-converter__button">
          Convert
        </button>
      </section>
      <section class="unit-convertor__results" aria-live="polite">
        <article class="unit-result unit-result--length">
          <h2 class="unit-result--title">Length (Meter/Feet)</h2>
          <p id="output-length" class="unit-result__value">
            20 meters = 65.616 feet | 20 feet = 6.096 meters
          </p>
        </article>
        <article class="unit-result unit-result--volume">
          <h2 class="unit-result--title">Volume (Liters/Gallons)</h2>
          <p id="output-volume" class="unit-result__value">
            20 liters = 5.284 gallons | 20 gallons = 75.708 liters
          </p>
        </article>
        <article class="unit-result unit-result--mass">
          <h2 class="unit-result--title">Mass (Kilograms/Pounds)</h2>
          <p id="output-mass" class="unit-result__value">
            20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos
          </p>
        </article>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
